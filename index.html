<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Sentence Generator</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 20px; background: #f9f9f9; color: #333; }
        h1 { text-align: center; }
        .controls, .copy-controls { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        
        /* Двухоконный контейнер */
        .results-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .result-box { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .result-box h3 { margin-top: 0; text-align: center; }
        
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; min-height: 200px; max-height: 400px; overflow-y: auto; font-size: 16px; line-height: 1.6; flex-grow: 1; }
        
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 5px; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        input[type="number"] { width: 70px; padding: 5px; font-size: 16px; text-align: center; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
        
        /* Адаптив для мобильных */
        @media (max-width: 768px) {
            .results-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1>🀄 Chinese Sentence Generator</h1>

    <!-- Настройки генерации -->
    <div class="controls">
        <label>Total sentences: <input type="number" id="count" value="10" min="2" max="100"></label>
        <div class="hint">(Will be rounded to an even number to maintain 50/50 split)</div>
        <br>
        <button id="generateBtn">🎲 Generate Sentences</button>
    </div>

    <!-- Два окна вывода -->
    <div class="results-container">
        <div class="result-box">
            <h3>🟢 Normal Mode</h3>
            <pre id="normalOutput">Click "Generate" to start...</pre>
            <button class="copy-single" data-target="normal">📋 Copy Normal Only</button>
        </div>
        <div class="result-box">
            <h3>🔴 Absurd Mode</h3>
            <pre id="absurdOutput">Click "Generate" to start...</pre>
            <button class="copy-single" data-target="absurd">📋 Copy Absurd Only</button>
        </div>
    </div>

    <!-- Настройки копирования 50/50 -->
    <div class="copy-controls">
        <h3>Combined Copy (Strict 50/50 Split)</h3>
        <label>Number of sentences to copy: <input type="number" id="copyCount" value="10" min="2" max="100"></label>
        <div class="hint">(Copies exactly half Normal and half Absurd, interleaved)</div>
        <br>
        <button id="copyCombinedBtn">📋 Copy Combined (50% Normal / 50% Absurd)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
