<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Sentence Generator</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f9f9f9; }
        h1 { text-align: center; }
        .controls, .result { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { margin-right: 15px; cursor: pointer; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; min-height: 100px; font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>🀄 Chinese Sentence Generator</h1>

    <div class="controls">
        <label><input type="radio" name="mode" value="normal" checked> Normal Mode</label>
        <label><input type="radio" name="mode" value="absurd"> Absurd Mode</label>
        <br><br>
        <label>Number of sentences: <input type="number" id="count" value="5" min="1" max="50" style="width: 60px;"></label>
        <br><br>
        <button id="generateBtn">🎲 Generate Sentences</button>
    </div>

    <div class="result">
        <h3>Result <span id="modeLabel" style="color: #666; font-weight: normal;">(normal)</span></h3>
        <pre id="output">Click "Generate" to start...</pre>
        <button id="copyBtn">📋 Copy All</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
